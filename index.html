<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paw & Preferences</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<img src="Paws_Preferences_Logo.png" alt="Paws & Preferences" class="logo" />

<!-- TypeScript will inject stacked cards here-->
<div class="card-stack" id="card-stack">
  <div class="empty" id="empty">
    <h2>All caught up!</h2>
    <p>Here are the cats you liked 💚</p>
    <div class="liked-summary" id="liked-summary"></div>
    <button id="btn-reset">Restart</button>
  </div>
</div>

  <!-- Action buttons -->
  <div class="actions">
    <button id="btn-nope">✕</button>
    <button id="btn-rewind">↩</button>
    <button id="btn-like">♥</button>
  </div>

  <!-- Live counters -->
  <div class="counter">
    <span>Nope: <em id="noped-count">0</em></span>
    <span>Like: <em id="liked-count">0</em></span>
  </div>

  <script src="main.js"></script>
</body>
</html>
